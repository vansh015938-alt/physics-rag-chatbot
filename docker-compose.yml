version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: physics-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: physics-rag-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  ollama_data:
